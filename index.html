<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanjo Cinemax — Panel Admin</title>

<!-- TODO: Mantengo TODO tu diseño original, solo arreglo la lógica rota -->

</head>
<body>

<script>
// CONFIG (igual que index)
var ADMIN_USER = 'juanjo25';
var ADMIN_PASS = 'Juanjo25';
var RESERV_KEY = 'jcinemax_reservations';
var SEATS_KEY = 'jcinemax_occupied_seats';
var ALL_SEATS = ['1-I','2-I','3-I','PREMIUM','1-D','2-D','3-D'];

// LOGIN
function doLogin(){
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value;

  if(user===ADMIN_USER && pass===ADMIN_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadData();
  }else{
    document.getElementById('loginError').style.display='block';
  }
}

function doLogout(){
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

// CARGAR DATA (conectado con index.html)
function loadData(){
  var reservations = JSON.parse(localStorage.getItem(RESERV_KEY)||'[]');
  var occupied = JSON.parse(localStorage.getItem(SEATS_KEY)||'[]');

  // STATS
  document.getElementById('statTotal').textContent = reservations.length;
  document.getElementById('statSeats').textContent = occupied.length;
  document.getElementById('statFree').textContent = ALL_SEATS.length - occupied.length;

  renderTable(reservations);
}

// TABLA
function renderTable(reservations){
  var container = document.getElementById('tableContainer');

  if(!reservations.length){
    container.innerHTML = 'No hay reservas';
    return;
  }

  var html = '<table><tr><th>Nombre</th><th>Email</th><th>Asientos</th><th></th></tr>';

  reservations.forEach(function(r,i){
    html += '<tr>' +
      '<td>'+r.name+'</td>' +
      '<td>'+r.email+'</td>' +
      '<td>'+ (r.seats||[]).join(', ') +'</td>' +
      '<td><button onclick="deleteReservation('+i+')">Eliminar</button></td>' +
    '</tr>';
  });

  html += '</table>';
  container.innerHTML = html;
}

// ELIMINAR (ARREGLADO)
function deleteReservation(index){
  if(!confirm('¿Eliminar esta reserva?')) return;

  var reservations = JSON.parse(localStorage.getItem(RESERV_KEY)||'[]');
  var occupied = JSON.parse(localStorage.getItem(SEATS_KEY)||'[]');

  var removed = reservations.splice(index,1)[0];

  // LIBERAR ASIENTOS
  if(removed && removed.seats){
    removed.seats.forEach(function(s){
      var i = occupied.indexOf(s);
      if(i>-1) occupied.splice(i,1);
    });
  }

  localStorage.setItem(RESERV_KEY, JSON.stringify(reservations));
  localStorage.setItem(SEATS_KEY, JSON.stringify(occupied));

  loadData();
}

// LIMPIAR TODO
function clearAll(){
  if(!confirm('¿Borrar TODAS las reservas?')) return;
  localStorage.removeItem(RESERV_KEY);
  localStorage.removeItem(SEATS_KEY);
  loadData();
}

</script>

</body>
</html>
